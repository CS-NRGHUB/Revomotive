<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Firebase IBS</title>
<style>
  body{font-family:sans-serif;max-width:500px;margin:40px auto;padding:20px}
  .ok{color:green;font-weight:bold}
  .err{color:red;font-weight:bold}
  input{width:100%;padding:10px;margin:6px 0;box-sizing:border-box;border:1px solid #ccc;border-radius:6px;font-size:14px}
  button{width:100%;padding:12px;background:#1B3A6B;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
  #log{background:#f5f5f5;padding:12px;border-radius:6px;margin-top:16px;font-size:12px;font-family:monospace;white-space:pre-wrap;min-height:100px}
</style>
</head>
<body>
<h2>🔥 Test Firebase IBS</h2>

<div id="status">Caricamento Firebase...</div>

<input id="email" type="email" placeholder="Email" value="">
<input id="pwd" type="password" placeholder="Password">
<button onclick="testLogin()">Test Login Email</button>
<button onclick="testGoogle()" style="background:#fff;color:#444;border:2px solid #ddd;margin-top:6px">Test Google Login</button>

<div id="log">In attesa...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const log = (msg, ok) => {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  el.textContent += `[${time}] ${msg}\n`;
  console.log(msg);
};

log('Script avviato');

try {
  const firebaseConfig = {
    apiKey: "AIzaSyDNmnwTxKSjhaj5oyK7TKRloOONd4ExeDk",
    authDomain: "revomotive-86242.firebaseapp.com",
    databaseURL: "https://revomotive-86242-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "revomotive-86242",
    storageBucket: "revomotive-86242.firebasestorage.app",
    messagingSenderId: "671550701303",
    appId: "1:671550701303:web:a34632e39c78548c55ddf2"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  log('✅ Firebase inizializzato correttamente');
  document.getElementById('status').innerHTML = '<span class="ok">✅ Firebase caricato</span>';

  auth.onAuthStateChanged(user => {
    if(user) {
      log('✅ Utente loggato: ' + user.email);
      document.getElementById('status').innerHTML = '<span class="ok">✅ Loggato come: ' + user.email + '</span>';
    } else {
      log('ℹ️ Nessun utente loggato');
    }
  });

  window.testLogin = function() {
    const email = document.getElementById('email').value.trim();
    const pwd = document.getElementById('pwd').value;
    log('Tentativo login: ' + email);
    auth.signInWithEmailAndPassword(email, pwd)
      .then(u => log('✅ LOGIN OK: ' + u.user.email))
      .catch(e => log('❌ ERRORE: ' + e.code + ' — ' + e.message));
  };

  window.testGoogle = function() {
    const provider = new firebase.auth.GoogleAuthProvider();
    log('Apertura popup Google...');
    auth.signInWithPopup(provider)
      .then(u => log('✅ GOOGLE OK: ' + u.user.email))
      .catch(e => log('❌ ERRORE Google: ' + e.code + ' — ' + e.message));
  };

} catch(e) {
  log('❌ ERRORE CRITICO: ' + e.message);
  document.getElementById('status').innerHTML = '<span class="err">❌ Errore: ' + e.message + '</span>';
}
</script>
</body>
</html>
